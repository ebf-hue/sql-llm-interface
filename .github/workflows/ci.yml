name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
          uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Tests
        env:
          PYTHONPATH: .
        run: pytest

